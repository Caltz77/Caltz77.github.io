<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EdEN</title>
<style>
*{margin:0;padding:0}
html,body{height:100%}
body{background:#1a1a2e;color:#ccc;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
p{color:#888;font-size:14px;margin-bottom:20px}
a#btn{display:none;background:#8ab4f8;color:#000;padding:16px 32px;border-radius:12px;font-size:18px;text-decoration:none;cursor:pointer;touch-action:manipulation}
</style>
</head>
<body>
<p id="msg">...</p>
<a id="btn" href="#">Abrir en EdEN</a>
<script>
(function() {
  var labels = { song:"Canción", playlist:"Playlist", album:"Álbum", artist:"Artista" };
  var m = window.location.pathname.match(/\/navipanel\/(song|playlist|album|artist)\/(.+)/);
  if (m) {
    document.getElementById("msg").textContent = labels[m[1]] + " compartida";
    var btn = document.getElementById("btn");
    btn.style.display = "inline-block";
    btn.onclick = function(e) {
      e.preventDefault();
      window.location.href = "eden://" + m[1] + "/" + m[2];
    };
  }
})();
</script>
</body>
</html>
