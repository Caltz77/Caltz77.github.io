<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirigiendo a EdEN...</title>
<script>
(function() {
  var path = window.location.pathname;
  var match = path.match(/\/navipanel\/(song|playlist)\/(.+)/);
  if (match) {
    var type = match[1];
    var id = match[2];
    window.location.href = "eden://" + type + "/" + id;
  }
})();
</script>
</head>
<body>
<p>Abriendo EdEN...</p>
</body>
</html>
