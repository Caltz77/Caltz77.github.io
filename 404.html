<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EdEN</title>
<script>
(function() {
  var path = window.location.pathname;
  var match = path.match(/\/navipanel\/(song|playlist)\/(.+)/);
  if (match) {
    var type = match[1], id = match[2];
    document.getElementById("btn").onclick = function() {
      window.location.href = "eden://" + type + "/" + id;
    };
    document.getElementById("btn").style.display = "block";
    document.getElementById("msg").textContent = type == "song" ? "Canción" : "Playlist";
  }
})();
</script>
<style>
body{background:#1a1a2e;color:#ccc;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;margin:0;padding:20px;text-align:center}
button{background:#8ab4f8;color:#000;border:none;padding:16px 32px;border-radius:12px;font-size:18px;cursor:pointer;display:none;margin-top:20px}
p{color:#888;font-size:14px}
</style>
</head>
<body>
<p id="msg">...</p>
<button id="btn">Abrir en EdEN</button>
</body>
</html>
